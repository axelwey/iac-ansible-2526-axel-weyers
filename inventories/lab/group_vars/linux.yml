---
ops_baseline:
  packages:
    # Op beide hosts
    - { name: "git",      enabled: true }
    - { name: "curl",     enabled: true }
    - { name: "fail2ban", enabled: true }

    # Enkel RedHat/Rocky
    - { name: "traceroute", enabled: true, os_family: "RedHat" }
    - { name: "whois",      enabled: true, os_family: "RedHat" }

    # Enkel Debian
    - { name: "tmux",    enabled: true, os_family: "Debian" }
    - { name: "tcpdump", enabled: true, os_family: "Debian" }
    - { name: "chrony",  enabled: true, os_family: "Debian" }

    # Enkel jumpbox
    - { name: "iperf3", enabled: true, group: "jumpbox" }

    # Enkel service_host
    - { name: "btop", enabled: true, group: "service_host" }

  users:
    - name: ops_admin
      admin: true
      host_group: "all"
      ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIops_admin_placeholder ops_admin@baseline"
    - name: deployer
      admin: false
      host_group: "service_host"
      ssh_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIdeployer_placeholder deployer@baseline"

  services:
    - name_redhat: sshd
      name_debian: ssh
      state: started
      enabled: true
    - name_redhat: chronyd
      name_debian: chrony
      state: started
      enabled: true
    - name_redhat: fail2ban
      name_debian: fail2ban
      state: started
      enabled: true
  guardrails:
    ssh_config: /etc/ssh/sshd_config
    ssh_backup: /etc/ssh/sshd_config.bak
    ssh_marker: /var/log/ansible_ssh_guardrail.log
    package_retries: 3
    package_delay: 5

# OS-mapping voor admin-groep
admin_group_map:
  RedHat: wheel
  Debian: sudo
# --- Common packages ---
common_packages:
  - git
  - curl
  - rsync

debian_extra_packages:
  - network-manager

# --- User: ops_admin ---
ops_admin_user: ops_admin
ops_admin_shell: /bin/bash
# Vervang dit door de output van: cat ~/.ssh/id_ed25519_iac.pub
ops_admin_ssh_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA... axel@axel-VMware"

