---
- name: Schakel PermitRootLogin uit
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ ssh_permit_root_login }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Schakel PasswordAuthentication uit
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd

- name: Zorg dat PubkeyAuthentication aan staat
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PubkeyAuthentication'
    line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}"
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart sshd
